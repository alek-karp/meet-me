pre-commit:
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,css,md,mdx}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  commands:
    test:
      run: bun test --pass-with-no-tests
    build:
      run: bun run build
